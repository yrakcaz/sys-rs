name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y clang gcc libunwind-dev libclang-dev llvm-dev \
            pkg-config build-essential

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true

      - name: Check if version already published
        id: check_version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d '"' -f 2)
          if curl -s -H 'User-Agent: sys-rs-ci' https://crates.io/api/v1/crates/sys-rs | \
          jq -e ".versions[] | select(.num == \"$VERSION\")" > /dev/null 2>&1; then
            echo "Version $VERSION already published, skipping"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION not found, will publish"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to crates.io
        if: steps.check_version.outputs.exists == 'false'
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
